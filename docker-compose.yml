version: "3.9"

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    # volumes:
    #   - ./todo-frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
  frontend:
    image: ${duser}/todo-frontend:${tag}
    # ports:
    #   - "3000:80"
    # depends_on:
    #   - backend
    

  backend:
    image: ${duser}/todo-backend:${tag}
    # ports:
    #   - "8000:8080"
    deploy:
      restart_policy:
        condition: any
    depends_on:
      - db
      

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: mydb
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
secrets:
  db_password:
    external: true
configs:
  nginx_conf:
    file: ./todo-frontend/nginx.conf