version: "3.9"

services:
  frontend:
    image: todo-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    

  backend:
    image: todo-backend
    ports:
      - "8000:8080"
    deploy:
      restart_policy:
        condition: any
    depends_on:
      - db
      

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: mydb
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
secrets:
  db_password:
    external: true