version: "3.9"

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    # volumes:
    #   - ./todo-frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - frontend
      - backend
  frontend:
    image: ${duser}/todo-frontend:${tag}
    # ports:
    #   - "3000:80"
    # depends_on:
    #   - backend
    

  backend:
    image: ${duser}/todo-backend:${tag}
    # ports:
    #   - "8000:8080"
    deploy:
      restart_policy:
        condition: any
    depends_on:
       - db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/todos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
        
      

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: mydb
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb" ]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
secrets:
  db_password:
    external: true
configs:
  nginx_conf:
    file: ./todo-frontend/nginx.conf