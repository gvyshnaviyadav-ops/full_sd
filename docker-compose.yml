version: "3.9"

networks:
  app-network:          
    driver: overlay     
    attachable: true   

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    networks:
      - app-network     
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      restart_policy:
        condition: any   

  frontend:
    image: ${duser}/todo-frontend:${tag}
    networks:
      - app-network
    deploy:
      restart_policy:
        condition: any

  backend:
    image: ${duser}/todo-backend:${tag}
    networks:
      - app-network
    deploy:
      restart_policy:
        condition: any  
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/todos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: postgres:15
    networks:
      - app-network
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: mydb
    secrets:
      - db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 30s
    deploy:
      restart_policy:
        condition: any

volumes:
  pgdata:

secrets:
  db_password:
    external: true

configs:
  nginx_conf:
    file: ./todo-frontend/nginx.conf